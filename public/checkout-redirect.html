<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecionando para o pagamento...</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #080808;
        color: #fff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        text-align: center;
      }
      .container {
        max-width: 420px;
        padding: 24px;
      }
      h1 {
        font-size: 1.75rem;
        margin-bottom: 1rem;
      }
      p {
        color: #c4c4c4;
        line-height: 1.75;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Aguarde...</h1>
      <p>Seu pagamento será carregado automaticamente em alguns segundos. Se nada acontecer, volte para a página anterior e tente novamente.</p>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const key = params.get('key');
      if (!key) {
        document.body.innerHTML = '<div class="container"><h1>Algo deu errado</h1><p>Não foi possível encontrar a chave de redirecionamento.</p></div>';
      } else {
        const intervalId = setInterval(() => {
          const link = window.localStorage.getItem(key);
          if (link) {
            window.localStorage.removeItem(key);
            clearInterval(intervalId);
            window.location.href = link;
          }
        }, 200);
        window.addEventListener('beforeunload', () => clearInterval(intervalId));
      }
    </script>
  </body>
</html>
